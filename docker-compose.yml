# docker-compose.yml

services:
  # 1. Infrastructure: Redis Cache Service (Uses Alpine - Minimal, No Git)
  redis:
    image: redis:7-alpine
    container_name: codespace_redis
    command: redis-server --appendonly yes
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data 

  # 2. Infrastructure: RabbitMQ Message Broker Service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: codespace_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 3. Infrastructure: MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: codespace_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 4. Backend Service: Assessment API
  assessment-api:
    build:
      context: ./assessment-api
      dockerfile: Dockerfile
    container_name: codespace_assessment_api
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./assessment-api:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - PORT=3000
      - REDIS_URI=redis://redis:6379
      - RABBITMQ_URI=amqp://user:password@rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq
      - mongo

  # 5. Backend Service: Judge Service
  judge-service:
    build:
      context: ./judge-service
      dockerfile: Dockerfile
    container_name: codespace_judge_service
    command: npm run dev
    volumes:
      - ./judge-service:/usr/src/app
      - /usr/src/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - ./judge-service/temp:/usr/src/app/temp
    environment:
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - RABBITMQ_URI=amqp://user:password@rabbitmq:5672
      - REDIS_URI=redis://redis:6379
    depends_on:
      - rabbitmq
      - mongo
      - redis
  judge-python:
    build:
      context: .
      dockerfile: judge-service/runtimes/python.Dockerfile
  judge-javascript:
    build:
      context: .
      dockerfile: judge-service/runtimes/javascript.Dockerfile
  judge-java:
    build:
      context: .
      dockerfile: judge-service/runtimes/java.Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codespace_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://assessment-api:3000

    depends_on:
      - assessment-api

volumes:
  redis_data:
  rabbitmq_data:
  mongo_data: