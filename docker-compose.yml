# docker-compose.yml

services:
  # 1. Infrastructure: Redis Cache Service (Uses Alpine - Minimal, No Git)
  redis:
    image: redis:7-alpine
    container_name: codespace_redis
    command: redis-server --appendonly yes
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - assessment-net

  # 2. Infrastructure: RabbitMQ Message Broker Service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: codespace_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - assessment-net

  # 3. Infrastructure: MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: codespace_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - assessment-net

  # 4. Backend Service: Assessment API
  assessment-api:
    build:
      context: ./assessment-api
      dockerfile: Dockerfile
    container_name: codespace_assessment_api
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./assessment-api:/usr/src/app
      - ./judge-service-go:/usr/src/app/judge-service-go:ro
      - /usr/src/app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - PORT=3000
      - REDIS_URI=redis://redis:6379
      - RABBITMQ_URI=amqp://user:password@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - assessment-net

  # 5. Backend Service: Judge Service
  # judge-service:
  #   build:
  #     context: ./judge-service
  #     dockerfile: Dockerfile
  #     args:
  #       DOCKER_GID: 103
  #   container_name: codespace_judge_service
  #   command: npm run dev
  #   volumes:
  #     - ./judge-service:/usr/src/app
  #     - /usr/src/app/node_modules
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - MONGO_URI=mongodb://mongo:27017/assessment_db
  #     - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
  #     - REDIS_URI=redis://redis:6379
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #     mongo:
  #       condition: service_started
  #     redis:
  #       condition: service_started
  #   networks:
  #     - assessment-net

  judge-service-go:
    build:
      context: ./judge-service-go
      dockerfile: Dockerfile
    container_name: codespace_judge_service_go
    volumes:
      - ./judge-service-go:/app
      - /var/run/docker.sock:/var/run/docker.sock # Needed for Docker-in-Docker functionality
    environment:
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - REDIS_URI=redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - assessment-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codespace_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://assessment-api:3000

    depends_on:
      - assessment-api
    networks:
      - assessment-net

volumes:
  redis_data:
  rabbitmq_data:
  mongo_data:

networks:
  assessment-net: