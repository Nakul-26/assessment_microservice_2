# docker-compose.yml

services:
  # 1. Infrastructure: Redis Cache Service (Uses Alpine - Minimal, No Git)
  redis:
    image: redis:7-alpine
    container_name: codespace_redis
    command: redis-server --appendonly yes
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data 

  # 2. Infrastructure: RabbitMQ Message Broker Service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: codespace_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 3. Infrastructure: MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: codespace_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 4. Backend Service: Assessment API
  assessment-api:
    build:
      context: ./assessment-api
      dockerfile: Dockerfile
    container_name: codespace_assessment_api
    ports:
      - "3000:3000"
    volumes:
      - ./assessment-api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - redis
      - rabbitmq
      - mongo

  # 5. Backend Service: Judge Service
  judge-service:
    build:
      context: ./judge-service
      dockerfile: Dockerfile
    container_name: codespace_judge_service
    volumes:
      - ./judge-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - rabbitmq
      - mongo

volumes:
  redis_data:
  rabbitmq_data:
  mongo_data: