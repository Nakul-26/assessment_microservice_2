name: "nsjail-for-judge"
description: "nsjail configuration for the judge service"

mode: ONCE

uidmap {
  inside_id: "99999"
  outside_id: "99999"
}

gidmap {
  inside_id: "99999"
  outside_id: "99999"
}

mount: [
  {
    src: "/usr/bin/"
    dst: "/usr/bin/"
    is_bind: true
    rw: false
  },
  {
    src: "/lib/"
    dst: "/lib/"
    is_bind: true
    rw: false
  },
  {
    src: "/lib64/"
    dst: "/lib64/"
    is_bind: true
    rw: false
  },
  {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
  },
  {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
  },
  {
    src: "/dev/fd/"
    dst: "/dev/fd/"
    is_bind: true
    rw: false
  },
  {
    src: "/proc/self/fd/"
    dst: "/proc/self/fd/"
    is_bind: true
    rw: false
  },
  {
    src: "/app/wrappers"
    dst: "/app/wrappers"
    is_bind: true
    rw: false
  },
  {
    src: "/app/temp"
    dst: "/app/temp"
    is_bind: true
    rw: true
  }
]
